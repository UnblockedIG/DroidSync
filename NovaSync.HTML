<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NovaSync</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg-base: #020617; /* Deep dark accent */
    --panel-bg: rgba(15, 23, 42, 0.75); /* Dark translucent */
    --line: rgba(56, 189, 248, 0.2); /* Subtle blue line */
    --line-solid: #1e293b;
    --text: #f8fafc;
    --dim: #94a3b8; 
    --accent: #38bdf8; 
    --accent-hover: #0ea5e9;
    --warn: #fbbf24; 
    --err: #ef4444;
    --blur: blur(16px);
  }

  * { box-sizing: border-box; }
  
  body {
    margin: 0; 
    background: var(--bg-base); 
    color: var(--text);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden; /* Strictly prevents scrolling */
    display: flex; 
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
  }

  /* --- FLOATING HEADER --- */
  header {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 900px;
    padding: 12px 20px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between;
    background: var(--panel-bg);
    backdrop-filter: var(--blur);
    border: 1px solid var(--line);
    border-radius: 100px; /* Pill shape */
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 10;
  }

  .logo-area { display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; margin: 0; color: var(--accent); letter-spacing: 0.5px; text-shadow: 0 0 12px rgba(56, 189, 248, 0.4); }
  
  .status { font-size: 12px; font-weight: 500; color: var(--dim); display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px;}
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); display: inline-block; transition: 0.3s; }
  .dot.on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

  .header-actions { display: flex; align-items: center; gap: 8px; }

  /* --- BUTTONS --- */
  .btn {
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid var(--line-solid); 
    color: var(--text);
    padding: 8px 16px; 
    border-radius: 100px;
    cursor: pointer; 
    font: inherit; 
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease;
  }
  .btn:hover:not(:disabled) { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); transform: translateY(-1px); }
  .btn:active:not(:disabled) { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: transparent; }
  
  .btn.primary { background: var(--accent); color: #020617; border: none; font-weight: 600; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
  .btn.primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
  .btn.icon { padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 34px; height: 34px;}

  /* --- MAIN STAGE (LOCKED BOUNDARIES) --- */
  main {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    padding: 90px 20px; /* Clears top and bottom floating bars */
    display: flex; 
    align-items: center; 
    justify-content: center;
    z-index: 1;
  }

  .stage {
    width: 100%;
    height: 100%;
    display: flex; 
    align-items: center; 
    justify-content: center;
    position: relative; 
  }

  /* The magic fix for fitting on screen */
  #screen {
    width: 100%;
    height: 100%;
    object-fit: contain; 
    border-radius: 12px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.8);
    cursor: crosshair; 
    touch-action: none;
    background: #000;
    border: 1px solid #1e293b;
  }

  .placeholder { color: var(--dim); font-size: 13px; text-align: center; padding: 20px; line-height: 1.6; max-width: 400px; background: rgba(15,23,42,0.5); border-radius: 16px; border: 1px solid var(--line-solid); }
  .fps { position: absolute; top: 12px; right: 12px; font-size: 11px; font-weight: 600; color: #020617; background: var(--accent); padding: 4px 8px; border-radius: 12px; box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }

  /* --- BOTTOM CONTROLS --- */
  .bottom-controls {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-bg);
    backdrop-filter: var(--blur);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 8px 12px;
    display: flex;
    gap: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    z-index: 10;
  }

  /* --- MODAL (SETTINGS & LOGS) --- */
  .modal-overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 50;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }

  .modal-content {
    background: #0f172a; border: 1px solid var(--line);
    border-radius: 24px; width: 420px; max-width: 90vw;
    display: flex; flex-direction: column; max-height: 85vh;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    overflow: hidden;
  }
  .modal-header {
    padding: 16px 24px; border-bottom: 1px solid var(--line-solid);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-header h2 { margin: 0; font-size: 16px; color: var(--text); }
  .modal-body { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
  
  .row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
  .row label { color: var(--text); font-weight: 500; }
  select { width: 150px; background: #020617; color: var(--text); border: 1px solid var(--line-solid); border-radius: 8px; padding: 8px; outline: none; }
  select:focus { border-color: var(--accent); }

  #log {
    background: #020617; border: 1px solid var(--line-solid); border-radius: 12px;
    padding: 12px; font-size: 11px; font-family: 'SFMono-Regular', Consolas, monospace; line-height: 1.6; 
    height: 180px; overflow-y: auto;
  }
  #log div { white-space: pre-wrap; word-break: break-word; margin-bottom: 4px;}
  .l-info { color: var(--dim); }
  .l-ok { color: var(--accent); }
  .l-warn { color: var(--warn); }
  .l-err { color: var(--err); }
  .note { font-size: 11px; color: var(--dim); line-height: 1.5; }

</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>NovaSync</h1>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Not connected</span></div>
  </div>
  <div class="header-actions">
    <button class="btn primary" id="connectBtn">Connect Device</button>
    <button class="btn" id="mirrorBtn" disabled>Start Mirror</button>
    <button class="btn icon" id="settingsBtn" title="Settings & Logs">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
</header>

<main>
  <div class="stage">
    <div class="placeholder" id="placeholder">
      <div style="color: var(--accent); margin-bottom: 8px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
      </div>
      Click <strong>Connect Device</strong>, pick your phone from the prompt, 
      and approve "Allow USB debugging" on the display.<br><br>
      <span style="color: var(--dim); font-size: 11px;">Supports trackpad swiping and physical keyboard typing.</span>
    </div>
    <canvas id="screen" style="display:none"></canvas>
    <div class="fps" id="fpsBadge" style="display:none">0 fps</div>
  </div>
</main>

<!-- BOTTOM CONTROLS MENU -->
<div class="bottom-controls">
  <button class="btn" id="btnPower">Power</button>
  <button class="btn" id="btnVolDown">Vol -</button>
  <button class="btn" id="btnVolUp">Vol +</button>
  <div style="width: 1px; background: var(--line-solid); margin: 0 2px;"></div>
  <button class="btn" id="btnHome">Home</button>
  <button class="btn" id="btnBack">Back</button>
  <button class="btn" id="btnRecent">Recents</button>
</div>

<!-- SETTINGS & LOGS MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>Settings & Diagnostics</h2>
      <button class="btn icon" id="closeModalBtn" style="border:none; background:rgba(255,255,255,0.05);">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <div class="row" style="margin-bottom: 12px;"><label>Max Resolution</label>
          <select id="maxDim">
            <option value="720">720px (Fast)</option>
            <option value="1080" selected>1080px (Balanced)</option>
            <option value="1440">1440px (Sharp)</option>
          </select>
        </div>
        <div class="row"><label>Bitrate</label>
          <select id="bitrate">
            <option value="4000000">4 Mbps</option>
            <option value="8000000" selected>8 Mbps</option>
            <option value="16000000">16 Mbps</option>
          </select>
        </div>
        <div class="note" style="margin-top:12px;">Changes apply the next time you start the mirror.</div>
      </div>
      <div>
        <h3 style="font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--dim); margin-top: 0; margin-bottom: 8px;">System Logs</h3>
        <div id="log"></div>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const logEl = $('log'), dot = $('dot'), statusText = $('statusText'), fpsBadge = $('fpsBadge');

const modal = $('modalOverlay');
$('settingsBtn').addEventListener('click', () => modal.classList.add('active'));
$('closeModalBtn').addEventListener('click', () => modal.classList.remove('active'));
modal.addEventListener('click', () => modal.classList.remove('active'));

function log(msg, cls='l-info'){
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}
function setStatus(text, connected){
  statusText.textContent = text;
  dot.classList.toggle('on', !!connected);
}

if (!('usb' in navigator)) { log('WebUSB not available. Use Chrome or Edge.', 'l-err'); setStatus('WebUSB unsupported', false); }
if (!('VideoDecoder' in window)) { log('WebCodecs not available.', 'l-err'); }

const CRC_TABLE = (() => {
  const t = [];
  for (let n = 0; n < 256; n++) { let c = n; for (let k=0;k<8;k++) c = (c&1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1); t[n]=c>>>0; }
  return t;
})();
function crc32(buf){ let crc=0xFFFFFFFF; for (let i=0;i<buf.length;i++) crc=(crc>>>8)^CRC_TABLE[(crc^buf[i])&0xFF]; return (crc^0xFFFFFFFF)>>>0; }
function strToBytes(s){ return new TextEncoder().encode(s); }
function bytesToStr(b){ return new TextDecoder().decode(b); }
function concatBytes(...arrs){ const len=arrs.reduce((a,b)=>a+b.length,0); const out=new Uint8Array(len); let o=0; for(const a of arrs){out.set(a,o); o+=a.length;} return out; }
function cmdId(s){ return s.charCodeAt(0)|(s.charCodeAt(1)<<8)|(s.charCodeAt(2)<<16)|(s.charCodeAt(3)<<24); }
const CMD = { CNXN:cmdId('CNXN'), AUTH:cmdId('AUTH'), OPEN:cmdId('OPEN'), OKAY:cmdId('OKAY'), CLSE:cmdId('CLSE'), WRTE:cmdId('WRTE') };
const CMD_NAME = Object.fromEntries(Object.entries(CMD).map(([k,v])=>[v,k]));
const AUTH_TOKEN=1, AUTH_SIGNATURE=2, AUTH_RSAPUBLICKEY=3;

function b64uToBigInt(b64u){ const b64=b64u.replace(/-/g,'+').replace(/_/g,'/'); const bin=atob(b64); let hex='0x'; for(let i=0;i<bin.length;i++) hex+=bin.charCodeAt(i).toString(16).padStart(2,'0'); return BigInt(hex); }
function modPow(base, exp, mod){ let r=1n; base%=mod; while(exp>0n){ if(exp&1n) r=(r*base)%mod; exp>>=1n; base=(base*base)%mod; } return r; }
function bigIntToBytesBE(x,len){ const b=new Uint8Array(len); for(let i=len-1;i>=0;i--){ b[i]=Number(x&0xffn); x>>=8n; } return b; }
function bigIntToBytesLE(x,len){ const b=new Uint8Array(len); for(let i=0;i<len;i++){ b[i]=Number(x&0xffn); x>>=8n; } return b; }
function modInverse(a,m){ let[oR,r]=[a,m],[oS,s]=[1n,0n]; while(r!==0n){ const q=oR/r; [oR,r]=[r,oR-q*r]; [oS,s]=[s,oS-q*s]; } let inv=oR===1n?oS%m:0n; if(inv<0n) inv+=m; return inv; }
const SHA1_DIGESTINFO_PREFIX = new Uint8Array([0x30,0x21,0x30,0x09,0x06,0x05,0x2b,0x0e,0x03,0x02,0x1a,0x05,0x00,0x04,0x14]);

class AdbKey {
  static async generate(){
    const keyPair = await crypto.subtle.generateKey({name:'RSASSA-PKCS1-v1_5',modulusLength:2048,publicExponent:new Uint8Array([1,0,1]),hash:'SHA-1'}, true, ['sign','verify']);
    const jwk = await crypto.subtle.exportKey('jwk', keyPair.privateKey);
    const k = new AdbKey(); k.n=b64uToBigInt(jwk.n); k.d=b64uToBigInt(jwk.d); k.e=65537n; return k;
  }
  signToken(tokenBytes){
    const modBytes=256;
    const digestInfo = concatBytes(SHA1_DIGESTINFO_PREFIX, tokenBytes);
    const psLen = modBytes - digestInfo.length - 3;
    const em = new Uint8Array(modBytes);
    em[0]=0x00; em[1]=0x01;
    for(let i=0;i<psLen;i++) em[2+i]=0xFF;
    em[2+psLen]=0x00; em.set(digestInfo, 3+psLen);
    let hex='0x'; for(const b of em) hex+=b.toString(16).padStart(2,'0');
    const s = modPow(BigInt(hex), this.d, this.n);
    return bigIntToBytesBE(s, modBytes);
  }
  publicKeyBlob(){
    const words=64, n0=this.n & 0xffffffffn;
    const n0invPos = modInverse(n0, 1n<<32n);
    const n0inv = ((1n<<32n)-n0invPos) % (1n<<32n);
    const RR = modPow(2n, BigInt(words*32*2), this.n);
    const buf = new Uint8Array(4+4+256+256+4);
    const dv = new DataView(buf.buffer);
    dv.setUint32(0, words, true); dv.setUint32(4, Number(n0inv), true);
    buf.set(bigIntToBytesLE(this.n,256), 8);
    buf.set(bigIntToBytesLE(RR,256), 8+256);
    dv.setUint32(8+256+256, Number(this.e), true);
    let bin=''; for(const b of buf) bin+=String.fromCharCode(b);
    return strToBytes(btoa(bin) + ' webadb-mirror@browser\0');
  }
}

class UsbTransport {
  constructor(device, epIn, epOut){ this.device=device; this.epIn=epIn; this.epOut=epOut; this._writeChain=Promise.resolve(); }

  static async requestAndOpen(){
    const filters = [{ classCode:0xff, subclassCode:0x42, protocolCode:0x01 }];
    const device = await navigator.usb.requestDevice({ filters });
    await device.open();
    if (device.configuration===null) await device.selectConfiguration(1);
    let ifaceNum=-1, epIn=-1, epOut=-1;
    for (const cfg of device.configurations) for (const iface of cfg.interfaces) for (const alt of iface.alternates){
      if (alt.interfaceClass===0xff && alt.interfaceSubclass===0x42 && alt.interfaceProtocol===0x01){
        ifaceNum = iface.interfaceNumber;
        for (const ep of alt.endpoints){
          if (ep.type==='bulk' && ep.direction==='in') epIn = ep.endpointNumber;
          if (ep.type==='bulk' && ep.direction==='out') epOut = ep.endpointNumber;
        }
      }
    }
    if (ifaceNum===-1) throw new Error('No ADB interface found');
    await device.claimInterface(ifaceNum);
    return new UsbTransport(device, epIn, epOut);
  }

  writeHeader(cmd, arg0, arg1, payload){
    this._writeChain = this._writeChain.then(() => this._writeRaw(cmd, arg0, arg1, payload));
    return this._writeChain;
  }
  async _writeRaw(cmd, arg0, arg1, payload){
    const dataLen = payload ? payload.length : 0;
    const crc = payload ? crc32(payload) : 0;
    const magic = (~cmd) >>> 0;
    const buf = new ArrayBuffer(24);
    const dv = new DataView(buf);
    dv.setUint32(0,cmd,true); dv.setUint32(4,arg0>>>0,true); dv.setUint32(8,arg1>>>0,true);
    dv.setUint32(12,dataLen,true); dv.setUint32(16,crc,true); dv.setUint32(20,magic,true);
    await this.device.transferOut(this.epOut, buf);
    if (dataLen>0) await this.device.transferOut(this.epOut, payload.buffer.slice(payload.byteOffset, payload.byteOffset+payload.byteLength));
  }

  async readMessage(){
    const header = await this._readExact(24);
    const dv = new DataView(header.buffer);
    const cmd=dv.getUint32(0,true), arg0=dv.getUint32(4,true), arg1=dv.getUint32(8,true), dataLen=dv.getUint32(12,true);
    let payload = new Uint8Array(0);
    if (dataLen>0) payload = await this._readExact(dataLen);
    return { cmd, arg0, arg1, payload };
  }
  async _readExact(n){
    const chunks=[]; let got=0;
    while (got<n){
      const res = await this.device.transferIn(this.epIn, n-got);
      const bytes = new Uint8Array(res.data.buffer, res.data.byteOffset, res.data.byteLength);
      chunks.push(bytes); got+=bytes.length;
      if (bytes.length===0) break;
    }
    return concatBytes(...chunks);
  }
}

class AdbConnection {
  constructor(transport, key){ this.t=transport; this.key=key; this.nextLocalId=1; this.streams=new Map(); this.pumpRunning=false; }

  async connect(onStatus){
    await this.t.writeHeader(CMD.CNXN, 0x01000001, 1048576, strToBytes('host::webadb-mirror\0'));
    let msg = await this.t.readMessage();
    if (msg.cmd===CMD.AUTH && msg.arg0===AUTH_TOKEN){
      onStatus && onStatus('Signing auth challenge…');
      const sig = this.key.signToken(msg.payload);
      await this.t.writeHeader(CMD.AUTH, AUTH_SIGNATURE, 0, sig);
      msg = await this.t.readMessage();
    }
    if (msg.cmd===CMD.AUTH){
      onStatus && onStatus('Approve on Phone');
      await this.t.writeHeader(CMD.AUTH, AUTH_RSAPUBLICKEY, 0, this.key.publicKeyBlob());
      msg = await this._waitForCnxn(30000);
    }
    if (msg.cmd!==CMD.CNXN) throw new Error(`Unexpected handshake: ${CMD_NAME[msg.cmd] || msg.cmd}`);
    this.deviceBanner = bytesToStr(msg.payload);
    this._startPump();
    return this.deviceBanner;
  }

  async _waitForCnxn(timeoutMs){
    const start = Date.now();
    while (Date.now()-start < timeoutMs){ const msg = await this.t.readMessage(); if (msg.cmd===CMD.CNXN) return msg; }
    throw new Error('Timed out waiting for device auth');
  }

  _startPump(){
    if (this.pumpRunning) return;
    this.pumpRunning = true;
    (async () => {
      while (this.pumpRunning){
        let msg;
        try { msg = await this.t.readMessage(); }
        catch(e){ log('USB read err: '+e.message, 'l-err'); this.pumpRunning=false; break; }
        const st = this.streams.get(msg.arg1);
        if (st){ if (st.resolvers.length) st.resolvers.shift()(msg); else st.queue.push(msg); }
      }
    })();
  }

  _register(localId){ const st = { queue:[], resolvers:[] }; this.streams.set(localId, st); return st; }
  _next(localId, st){ return new Promise(resolve => { if (st.queue.length) resolve(st.queue.shift()); else st.resolvers.push(resolve); }); }

  async runShell(command){
    const localId = this.nextLocalId++;
    const st = this._register(localId);
    await this.t.writeHeader(CMD.OPEN, localId, 0, strToBytes(`shell:${command}\0`));
    let msg = await this._next(localId, st);
    if (msg.cmd===CMD.CLSE){ this.streams.delete(localId); return new Uint8Array(0); }
    const remoteId = msg.arg0;
    const chunks = [];
    while (true){
      msg = await this._next(localId, st);
      if (msg.cmd===CMD.CLSE) break;
      if (msg.cmd===CMD.WRTE){ chunks.push(msg.payload); await this.t.writeHeader(CMD.OKAY, localId, remoteId); }
    }
    this.streams.delete(localId);
    return concatBytes(...chunks);
  }

  openStream(service){
    const localId = this.nextLocalId++;
    const st = this._register(localId);
    const conn = this;
    let remoteId = null, stopped = false;
    const gen = (async function*(){
      await conn.t.writeHeader(CMD.OPEN, localId, 0, strToBytes(`${service}\0`));
      let msg = await conn._next(localId, st);
      if (msg.cmd===CMD.CLSE){ conn.streams.delete(localId); return; }
      remoteId = msg.arg0;
      while (!stopped){
        msg = await conn._next(localId, st);
        if (msg.cmd===CMD.CLSE) break;
        if (msg.cmd===CMD.WRTE){ yield msg.payload; await conn.t.writeHeader(CMD.OKAY, localId, remoteId); }
      }
      conn.streams.delete(localId);
    })();
    return {
      [Symbol.asyncIterator](){ return gen; },
      stop: async () => { stopped = true; if (remoteId!=null){ try{ await conn.t.writeHeader(CMD.CLSE, localId, remoteId); }catch(e){} } conn.streams.delete(localId); }
    };
  }
}

function splitAnnexB(buf){
  const positions = [];
  for (let i=0; i+2<buf.length; i++){
    if (buf[i]===0 && buf[i+1]===0 && buf[i+2]===1){ positions.push({start:i,len:3}); i+=2; }
    else if (i+3<buf.length && buf[i]===0 && buf[i+1]===0 && buf[i+2]===0 && buf[i+3]===1){ positions.push({start:i,len:4}); i+=3; }
  }
  if (positions.length < 2) return { nals: [], rest: buf };
  const nals = [];
  for (let k=0;k<positions.length-1;k++) nals.push(buf.slice(positions[k].start+positions[k].len, positions[k+1].start));
  const rest = buf.slice(positions[positions.length-1].start);
  return { nals, rest };
}

let conn = null, deviceSize = null, mirrorActive = false, currentStream = null;
const canvas = $('screen'), ctx = canvas.getContext('2d');
const placeholder = $('placeholder');
let frameCount = 0, lastFpsTs = performance.now();

$('connectBtn').addEventListener('click', async () => {
  try {
    setStatus('Requesting device…', false);
    const transport = await UsbTransport.requestAndOpen();
    log('Starting ADB handshake…');
    const key = await AdbKey.generate();
    conn = new AdbConnection(transport, key);
    const banner = await conn.connect((s)=>{ setStatus(s, false); log(s, 'l-warn'); });
    log('Connected: ' + banner, 'l-ok');
    setStatus('Connected', true);
    $('mirrorBtn').disabled = false;
    $('connectBtn').textContent = 'Reconnect';

    const sizeOut = bytesToStr(await conn.runShell('wm size'));
    const match = sizeOut.match(/(\d+)x(\d+)/);
    if (match) deviceSize = { w:+match[1], h:+match[2] };
    log('Screen size: ' + (deviceSize ? `${deviceSize.w}x${deviceSize.h}` : 'unknown'));
  } catch (e){
    log('Connection failed: ' + e.message, 'l-err');
    setStatus('Connection failed', false);
  }
});

$('mirrorBtn').addEventListener('click', () => { if (mirrorActive) stopMirror(); else startMirror(); });

function computeOutputSize(){
  const maxDim = +$('maxDim').value;
  const { w, h } = deviceSize;
  const scale = Math.min(1, maxDim / Math.max(w, h));
  const outW = Math.max(2, Math.round(w*scale/2)*2);
  const outH = Math.max(2, Math.round(h*scale/2)*2);
  return { outW, outH };
}

async function pickDecoderConfig(){
  const candidates = ['avc1.640028', 'avc1.4d0028', 'avc1.42e01e'];
  for (const codec of candidates){
    try { const r = await VideoDecoder.isConfigSupported({ codec }); if (r.supported) return codec; } catch(e){}
  }
  return candidates[0];
}

async function startMirror(){
  if (!deviceSize) { log('No device size yet — reconnect first.', 'l-warn'); return; }
  mirrorActive = true;
  placeholder.style.display = 'none';
  canvas.style.display = 'block';
  fpsBadge.style.display = 'block';
  $('mirrorBtn').textContent = 'Stop Mirror';
  $('mirrorBtn').classList.add('primary');

  const { outW, outH } = computeOutputSize();
  const bitrate = $('bitrate').value;
  const codecStr = await pickDecoderConfig();
  log(`Streaming ${outW}x${outH} @ ${(+bitrate/1e6)}Mbps`);

  while (mirrorActive){
    let decoder;
    try {
      decoder = new VideoDecoder({
        output: (frame) => {
          canvas.width = frame.displayWidth; canvas.height = frame.displayHeight;
          ctx.drawImage(frame, 0, 0);
          frame.close();
          frameCount++;
          const now = performance.now();
          if (now - lastFpsTs > 1000){ fpsBadge.textContent = (frameCount*1000/(now-lastFpsTs)).toFixed(1)+' fps'; frameCount=0; lastFpsTs=now; }
        },
        error: (e) => log('Decoder error: ' + e.message, 'l-warn')
      });
      decoder.configure({ codec: codecStr, optimizeForLatency: true });
    } catch(e){ log('Could not create decoder: ' + e.message, 'l-err'); break; }

    const service = `shell:screenrecord --output-format=h264 --size ${outW}x${outH} --bit-rate ${bitrate} -`;
    currentStream = conn.openStream(service);

    let pending = new Uint8Array(0);
    let currentFrameNals = [];
    let currentFrameHasSlice = false;
    let ts = 0;
    let sawFirstKey = false;
    const streamStart = performance.now();

    function flushFrame(){
      if (!currentFrameNals.length) return;
      const isKey = currentFrameNals.some(n => (n[0]&0x1F)===5);
      if (!sawFirstKey && !isKey) { currentFrameNals = []; currentFrameHasSlice = false; return; } 
      if (isKey) sawFirstKey = true;
      const withStart = currentFrameNals.map(n => concatBytes(new Uint8Array([0,0,0,1]), n));
      const data = concatBytes(...withStart);
      try { decoder.decode(new EncodedVideoChunk({ type: isKey?'key':'delta', timestamp: ts, data })); ts += 33333; }
      catch(e){ log('decode() failed', 'l-warn'); }
      currentFrameNals = [];
      currentFrameHasSlice = false;
    }

    try {
      for await (const chunk of currentStream){
        pending = concatBytes(pending, chunk);
        const { nals, rest } = splitAnnexB(pending);
        pending = rest;
        for (const nal of nals){
          const type = nal[0] & 0x1F;
          const isSlice = (type===1 || type===5);
          if (isSlice && currentFrameHasSlice) flushFrame();
          currentFrameNals.push(nal);
          if (isSlice) currentFrameHasSlice = true;
        }
        if (performance.now() - streamStart > 170000) break;
      }
    } catch(e){ log('Stream error: ' + e.message, 'l-warn'); }

    flushFrame();
    try { await currentStream.stop(); } catch(e){}
    try { if (decoder.state !== 'closed') decoder.close(); } catch(e){}

    if (mirrorActive) log('Reconnecting stream…', 'l-info');
  }
}

function stopMirror(){
  mirrorActive = false;
  if (currentStream) currentStream.stop().catch(()=>{});
  $('mirrorBtn').textContent = 'Start Mirror';
  $('mirrorBtn').classList.remove('primary');
  fpsBadge.style.display = 'none';
}

async function sendKeyevent(code){ if (!conn) return; try { await conn.runShell(`input keyevent ${code}`); } catch(e){} }

$('btnHome').addEventListener('click', ()=>sendKeyevent(3));
$('btnBack').addEventListener('click', ()=>sendKeyevent(4));
$('btnRecent').addEventListener('click', ()=>sendKeyevent(187));
$('btnPower').addEventListener('click', ()=>sendKeyevent(26));
$('btnVolDown').addEventListener('click', ()=>sendKeyevent(25));
$('btnVolUp').addEventListener('click', ()=>sendKeyevent(24));

let pointerDown = false, startX, startY, startTime;
function getCanvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: Math.round((e.clientX - rect.left) / rect.width * deviceSize.w),
    y: Math.round((e.clientY - rect.top) / rect.height * deviceSize.h)
  };
}

canvas.addEventListener('pointerdown', (e) => {
  if (!conn || !deviceSize) return;
  pointerDown = true;
  canvas.setPointerCapture(e.pointerId);
  const coords = getCanvasCoords(e);
  startX = coords.x;
  startY = coords.y;
  startTime = Date.now();
});

canvas.addEventListener('pointerup', async (e) => {
  if (!pointerDown) return;
  pointerDown = false;
  canvas.releasePointerCapture(e.pointerId);
  
  const {x, y} = getCanvasCoords(e);
  const duration = Date.now() - startTime;
  const dist = Math.hypot(x - startX, y - startY);

  try {
    if (dist > 15) {
      await conn.runShell(`input swipe ${startX} ${startY} ${x} ${y} ${Math.min(duration, 2000)}`);
    } else {
      await conn.runShell(`input tap ${x} ${y}`);
    }
  } catch(err){ log('Input failed: '+err.message,'l-warn'); }
});

window.addEventListener('keydown', async (e) => {
  if (!mirrorActive || !conn) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  const keyMap = {
    'Enter': 66, 'Backspace': 67, 'Escape': 111, 'ArrowUp': 19,
    'ArrowDown': 20, 'ArrowLeft': 21, 'ArrowRight': 22, 'Tab': 61, 'Space': 62
  };

  if (keyMap[e.key]) {
    await sendKeyevent(keyMap[e.key]);
    e.preventDefault();
  } else if (e.key.length === 1) {
    let char = e.key;
    if (char === " ") {
      char = "%s"; 
    } else {
      char = char.replace(/(["'$`\\])/g, '\\$1');
    }
    try { await conn.runShell(`input text ${char}`); } catch(err){}
    e.preventDefault();
  }
});

log('NovaSync Ready. Connect your phone via USB to begin.');
</script>
